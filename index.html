<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme Corp. Employee Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <nav class="navbar">
            <div class="logo">ACME CORP.</div>
            <ul class="nav-links">
                <li>Dashboard</li>
                <li>My Benefits</li>
                <li>Payroll</li>
                <li>IT Support</li>
            </ul>
            <button class="sign-out">SIGN OUT</button>
        </nav>

        <main class="content">
            <section class="visual-rack">
                <div class="rack-frame"></div>
                <div class="clothes">
                    <div class="item coat"></div>
                    <div class="item shirt-blue"></div>
                    <div class="item shirt-maroon"></div>
                </div>
            </section>

            <section class="info-panel">
                <div class="text-content">
                    <h1>Employee Handbook</h1>
                    <p>Access your comprehensive guide to Acme Corp's policies and benefits. Stay informed about everything you need for a successful career.</p>
                </div>

                <div class="categories">
                    <div class="cat-card"><span>Dress Code</span></div>
                    <div class="cat-card"><span>Conduct</span></div>
                    <div class="cat-card"><span>Benefits</span></div>
                </div>

                <div class="contacts-grid">
                    <div class="contact-card">HR Contact</div>
                    <div class="contact-card">IT Helpdesk</div>
                    <div class="contact-card">Facilities</div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
