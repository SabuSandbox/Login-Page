<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearl Global - Employee Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <nav class="navbar">
            <div class="logo">ACME CORP.</div>
            <ul class="nav-links">
                <li>Dashboard</li>
                <li>My Benefits</li>
                <li>Payroll & HR</li>
                <li>IT Support</li>
            </ul>
            <button class="sign-out">SIGN OUT</button>
        </nav>

        <main class="content">
            <section class="visual-rack">
                <img src="image_4.png" alt="Company Uniform Rack" class="clothing-image">
            </section>

            <section class="info-panel">
                <div class="header">
                    <h2>Employee Portal</h2>
                    <p>Enter your credentials to access company resources.</p>
                </div>

                <form class="login-box">
                    <div class="input-group">
                        <label for="username">USERNAME or EMAIL</label>
                        <input type="text" id="username" placeholder="john.doe@company.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="login-footer">
                        <button type="submit" class="login-btn">LOG IN</button>
                        <a href="https://pearlglobalcentral.com/password/reset" class="forgot" target="_blank">Forgot Password?</a>
                    </div>
                </form>

                <div class="categories">
                    <div class="cat-card">Dress Code</div>
                    <div class="cat-card">Conduct</div>
                    <div class="cat-card">Benefits</div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
